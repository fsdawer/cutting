spring:
  application:
    name: beauty

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB

  # ── DB 연결 ──────────────────────────────────────────
  datasource:
    url: jdbc:mysql://localhost:3306/Beauty?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME}      # .env → DB_USERNAME
    password: ${DB_PASSWORD}      # .env → DB_PASSWORD
    driver-class-name: com.mysql.cj.jdbc.Driver

  # ── JPA ──────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: update       # 개발 중: update / 운영 배포 시: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  # ── 이메일 (네이버 SMTP) ──────────────────────────────
  mail:
    host: smtp.naver.com
    port: 465
    username: ${NAVER_MAIL_USERNAME}   # .env → NAVER_MAIL_USERNAME
    password: ${NAVER_MAIL_PASSWORD}   # .env → NAVER_MAIL_PASSWORD
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true

  # ── Redis ────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  ## ── OAuth2 소셜 로그인 ────────────────────────────────
  security:
    oauth2:
      client:
        registration:
          kakao:
            client-id: ${KAKAO_CLIENT_ID}
            client-secret: ${KAKAO_CLIENT_SECRET}
            client-authentication-method: client_secret_post   # 카카오는 POST body 방식 필수
            redirect-uri: "{baseUrl}/login/oauth2/code/kakao"
            authorization-grant-type: authorization_code
            scope:
              - profile_nickname
              - account_email
          naver:
            client-id: ${NAVER_CLIENT_ID}
            client-secret: ${NAVER_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/naver"
            authorization-grant-type: authorization_code
            scope:
              - name
              - email
        provider:
          kakao:
            authorization-uri: https://kauth.kakao.com/oauth/authorize
            token-uri: https://kauth.kakao.com/oauth/token
            user-info-uri: https://kapi.kakao.com/v2/user/me
            user-name-attribute: id
          naver:
            authorization-uri: https://nid.naver.com/oauth2.0/authorize
            token-uri: https://nid.naver.com/oauth2.0/token
            user-info-uri: https://openapi.naver.com/v1/nid/me
            user-name-attribute: response

# ── 토스페이먼츠 ─────────────────────────────────────────
toss:
  secret-key: ${TOSS_SECRET_KEY}       # .env → TOSS_SECRET_KEY
  client-key: ${TOSS_CLIENT_KEY}       # .env → TOSS_CLIENT_KEY (프론트 위젯용)



# ── JWT 설정 ──────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET}             # .env → JWT_SECRET (최소 32자 랜덤 문자열)
  access-token-expiration: 3600000      # 1시간 (ms)
  refresh-token-expiration: 604800000   # 7일 (ms)

# ── 서버 포트 ─────────────────────────────────────────
server:
  port: 8080
